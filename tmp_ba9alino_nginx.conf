server {
    listen 80;
    listen [::]:80;
    server_name ba9alino.duckdns.org;

    root /var/www/ba9alino;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }
}
