server {
    server_name ba9alino.ma ba9alino.duckdns.org;

    root /var/www/ba9alino;
    index index.html;

    # En-têtes CORS communs (définis une seule fois via une variable)
    # NB: on masque les en-têtes CORS renvoyés par les services upstream
    #     (PostgREST / Auth / Storage) pour éviter les doublons "*, *".

    # REST API → PostgREST (port 3001)
    location /rest/v1/ {
        rewrite ^/rest/v1/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;

        # Supprimer les en-têtes CORS de l'upstream pour éviter les doublons
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Prefer, Range, apikey, x-client-info, X-Supabase-Api-Version, Accept-Profile, Content-Profile, x-upsert" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Profile" always;
        add_header Access-Control-Max-Age 86400 always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Auth → Auth service (port 3002)
    location /auth/v1/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, x-client-info, X-Supabase-Api-Version" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Max-Age 86400 always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Storage API (port 3003)
    location /storage/v1/ {
        rewrite ^/storage/v1/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 20M;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-upsert, x-client-info, apikey, X-Supabase-Api-Version" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Max-Age 86400 always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Frontend SPA (React)
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ba9alino.ma/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ba9alino.ma/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = ba9alino.ma) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = ba9alino.duckdns.org) {
        return 301 https://ba9alino.ma$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ba9alino.ma ba9alino.duckdns.org;
    return 404; # managed by Certbot
}
